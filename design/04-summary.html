<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary min-h-screen flex flex-col items-center overflow-x-hidden">

<div class="flex items-center gap-2">

</div>
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="w-full max-w-md flex flex-col gap-stack-lg px-container-padding py-stack-md pb-40">

</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface uppercase tracking-tight">Workout Complete</h1>
<p class="font-body-md text-body-md text-on-surface-variant/70 mt-1">High intensity session locked in.</p>
</section>
<!-- Primary Metric Bento Grid -->
<section class="grid grid-cols-2 gap-card-gap">
<!-- Distance -->
<div class="glass-card p-4 rounded-xl flex flex-col gap-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm" data-icon="straighten">straighten</span>
<span class="font-label-caps text-label-caps opacity-80 uppercase">Distance</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-metric-sm text-metric-sm text-on-surface">5.82</span>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">KM</span>
</div>
</div>
<!-- Duration -->
<div class="glass-card p-4 rounded-xl flex flex-col gap-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm" data-icon="timer">timer</span>
<span class="font-label-caps text-label-caps opacity-80 uppercase">Duration</span>
</div>

<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">MIN</span>
</div>
</div>
<!-- Avg Speed -->
<div class="glass-card p-4 rounded-xl flex flex-col gap-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm" data-icon="avg_pace">avg_pace</span>
<span class="font-label-caps text-label-caps opacity-80 uppercase">Avg Speed</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-metric-sm text-metric-sm text-on-surface">8.4</span>
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">KM/H</span>
</div>
</div>
<!-- Max Speed -->
<div class="glass-card p-4 rounded-xl flex flex-col gap-1 bg-primary/5 border-primary/20">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm" data-icon="speed">speed</span>
<span class="font-label-caps text-label-caps opacity-80 uppercase">Max Speed</span>
</div>
<div class="flex items-baseline gap-1">
<span class="font-metric-sm text-metric-sm text-primary">12.1</span>

<!-- Route Visualization -->

<div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent"></div>
<div class="absolute bottom-4 left-4 flex items-center gap-2 bg-surface/90 backdrop-blur px-3 py-1.5 rounded-full border border-surface-variant shadow-sm">
<span class="material-symbols-outlined text-primary text-sm" data-icon="location_on">location_on</span>
<span class="font-label-caps text-[10px] text-on-surface uppercase font-bold">Park Central Circuit</span>

<!-- Speed Over Time Chart -->

<defs>

<stop offset="100%" stop-color="#ff6600" stop-opacity="0"></stop>

<path d="M0 35 Q 10 30, 20 25 T 40 15 T 60 20 T 80 5 T 100 10 V 40 H 0 Z" fill="url(#chartGradient)"></path>
<path d="M0 35 Q 10 30, 20 25 T 40 15 T 60 20 T 80 5 T 100 10" fill="none" stroke="#ff6600" stroke-width="2"></path>

<div class="absolute -left-2 top-0 h-full flex flex-col justify-between text-[8px] font-mono text-on-surface-variant/40 pointer-events-none">
<span>15</span>
<span>10</span>
<span>5</span>
<span>0</span>
</div>
</div>

<!-- Bottom Action Bar -->

<button class="flex-1 h-14 rounded-xl border border-outline/30 text-on-surface font-label-caps text-label-caps flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-lg" data-icon="delete">delete</span>
            DELETE
        </button>
<button class="flex-[2] h-14 bg-primary-container rounded-xl text-on-primary font-label-caps text-label-caps font-bold flex items-center justify-center gap-2 glow-orange hover:opacity-95 active:scale-95 transition-all">
<span class="material-symbols-outlined text-lg" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            DONE
        </button>
</div>
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        const canvas = document.createElement('canvas');
        canvas.className = 'fixed inset-0 pointer-events-none opacity-10 z-0';
        document.body.prepend(canvas);
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.1,
                vy: (Math.random() - 0.5) * 0.1,
                size: Math.random() * 3
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#a33e00';
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body></html>
